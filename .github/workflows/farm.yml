name: Farm

# Multiple cron schedules simulate non-uniform timing across the day.
# The scheduler module adds additional randomness — not every trigger
# results in a commit. GitHub Actions runs are free for public repos.

on:
  schedule:
    - cron: '15 14 * * 1-5'   # weekdays 2:15pm UTC
    - cron: '45 9  * * 2,4'   # tue/thu 9:45am UTC
    - cron: '00 19 * * 1,3,5' # mon/wed/fri 7:00pm UTC
    - cron: '30 11 * * 1,5'   # mon/fri 11:30am UTC
    - cron: '00 16 * * 6'     # saturday 4:00pm UTC (low probability run)

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no commits)'
        required: false
        default: 'false'
      force:
        description: 'Force commit (skip probability check)'
        required: false
        default: 'false'

jobs:
  farm:
    runs-on: ubuntu-latest

    # Allow the job to write state back to this repo
    permissions:
      contents: write

    steps:
      - name: Checkout commit-farmer
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run farmer
        run: node src/index.js
        env:
          FARM_TOKEN:       ${{ secrets.FARM_TOKEN }}
          TARGET_REPO:      ${{ secrets.TARGET_REPO }}
          GITHUB_USERNAME:  ${{ secrets.GITHUB_USERNAME }}
          GIT_AUTHOR_NAME:  ${{ secrets.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
          INTENSITY:        ${{ secrets.INTENSITY }}
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
          FORCE:            ${{ github.event.inputs.force || 'false' }}

      - name: Persist state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .state/run.json
          git diff --cached --quiet || git commit -m "chore: update run state [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# --- Required repository secrets ---
#
# FARM_TOKEN        Fine-grained PAT with Contents: Read+Write on TARGET_REPO
#                   Generate at: github.com/settings/tokens
#
# TARGET_REPO       owner/repo of the farm target (e.g. thedevonstone/dev-til)
# GITHUB_USERNAME   Your GitHub username
# GIT_AUTHOR_NAME   Name on commits (e.g. Devon Stone)
# GIT_AUTHOR_EMAIL  Email on commits — must match a verified GitHub email
# INTENSITY         light | medium | heavy  (default: medium, ~10 commits/day)
